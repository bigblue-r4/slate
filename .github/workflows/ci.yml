name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Format check
        run: |
          test -z "$(gofmt -l .)"
      - name: Test
        run: |
          go test ./...
      - name: Build
        run: |
          go build ./...
      - name: Vet
        run: |
          go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
